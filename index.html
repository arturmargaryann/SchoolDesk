<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>School Management System</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Armenian:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f1117;
  --surface: #161b27;
  --surface2: #1e2535;
  --surface3: #252d3d;
  --border: #2a3347;
  --border2: #354060;
  --accent: #4f8ef7;
  --accent2: #7c3aed;
  --green: #22c55e;
  --amber: #f59e0b;
  --red: #ef4444;
  --text: #e8eaf0;
  --text2: #8b93a8;
  --text3: #555f77;
  --radius: 10px;
  --radius2: 14px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans Armenian', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
.hidden { display: none !important; }

#login-screen {
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  background: radial-gradient(ellipse at 30% 40%, #1a2540 0%, var(--bg) 60%);
}
.login-box {
  width: 380px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius2);
  padding: 2.5rem;
}
.login-logo { text-align: center; margin-bottom: 2rem; }
.login-logo .icon {
  width: 52px; height: 52px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-radius: 14px;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 24px; margin-bottom: 12px;
}
.login-logo h1 { font-size: 18px; font-weight: 600; color: var(--text); }
.login-logo p { font-size: 13px; color: var(--text2); margin-top: 4px; }
.role-tabs { display: flex; gap: 4px; background: var(--surface2); border-radius: var(--radius); padding: 4px; margin-bottom: 1.5rem; }
.role-tab { flex: 1; text-align: center; padding: 8px; border-radius: 7px; font-size: 13px; cursor: pointer; color: var(--text2); transition: all 0.2s; }
.role-tab.active { background: var(--surface3); color: var(--text); font-weight: 500; }
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 6px; }
.form-group input {
  width: 100%; padding: 10px 14px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius); color: var(--text); font-size: 14px;
  font-family: inherit; outline: none; transition: border 0.2s;
}
.form-group input:focus { border-color: var(--accent); }
.login-btn {
  width: 100%; padding: 11px;
  background: linear-gradient(135deg, var(--accent), #3b70d4);
  border: none; border-radius: var(--radius); color: #fff;
  font-size: 14px; font-weight: 600; cursor: pointer;
  font-family: inherit; margin-top: 8px; transition: opacity 0.2s;
}
.login-btn:hover { opacity: 0.9; }
.demo-hint { font-size: 11px; color: var(--text3); text-align: center; margin-top: 12px; }
.error-msg { font-size: 12px; color: var(--red); text-align: center; margin-top: 8px; min-height: 16px; }

#app-screen { display: flex; min-height: 100vh; }

.sidebar {
  width: 220px; flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
}
.sidebar-header { padding: 20px 18px 16px; border-bottom: 1px solid var(--border); }
.sidebar-header .brand { font-size: 15px; font-weight: 700; color: var(--text); }
.sidebar-header .user-info { font-size: 12px; color: var(--text2); margin-top: 4px; }
.sidebar-header .user-role {
  display: inline-block; margin-top: 6px;
  font-size: 10px; padding: 2px 8px;
  background: var(--surface3); border-radius: 20px; color: var(--accent);
  font-family: 'JetBrains Mono', monospace;
}
.sidebar-nav { flex: 1; padding: 12px 10px; }
.nav-section { font-size: 10px; color: var(--text3); padding: 8px 8px 4px; text-transform: uppercase; letter-spacing: 0.08em; }
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 10px; border-radius: 8px;
  font-size: 13px; color: var(--text2);
  cursor: pointer; transition: all 0.15s; margin-bottom: 2px;
}
.nav-item:hover { background: var(--surface2); color: var(--text); }
.nav-item.active { background: linear-gradient(135deg, rgba(79,142,247,0.15), rgba(124,58,237,0.1)); color: var(--accent); }
.nav-item .ni { font-size: 16px; width: 20px; text-align: center; }
.sidebar-footer { padding: 14px; border-top: 1px solid var(--border); }
.logout-btn {
  width: 100%; padding: 8px; background: transparent;
  border: 1px solid var(--border); border-radius: 8px;
  color: var(--text2); font-size: 12px; cursor: pointer;
  font-family: inherit; transition: all 0.15s;
}
.logout-btn:hover { border-color: var(--red); color: var(--red); }

.main { flex: 1; overflow-y: auto; }
.page { padding: 28px 32px; display: none; }
.page.active { display: block; }
.page-title { font-size: 22px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
.page-sub { font-size: 13px; color: var(--text2); margin-bottom: 24px; }

.stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 24px; }
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius2); padding: 18px 20px; }
.stat-card .sc-label { font-size: 11px; color: var(--text3); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.06em; }
.stat-card .sc-val { font-size: 28px; font-weight: 700; color: var(--text); }
.stat-card .sc-sub { font-size: 11px; color: var(--text2); margin-top: 4px; }
.stat-card.accent { border-color: rgba(79,142,247,0.3); }
.stat-card.green { border-color: rgba(34,197,94,0.3); }
.stat-card.red { border-color: rgba(239,68,68,0.3); }

.table-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius2); overflow: hidden; margin-bottom: 20px; }
.table-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.table-header h3 { font-size: 14px; font-weight: 600; }
.btn { padding: 7px 16px; border-radius: 8px; font-size: 12px; cursor: pointer; font-family: inherit; transition: all 0.15s; font-weight: 500; }
.btn-primary { background: var(--accent); border: none; color: #fff; }
.btn-primary:hover { background: #3b70d4; }
table { width: 100%; border-collapse: collapse; }
th { padding: 10px 16px; text-align: left; font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; border-bottom: 1px solid var(--border); font-weight: 500; }
td { padding: 12px 16px; font-size: 13px; border-bottom: 1px solid var(--border); }
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--surface2); }

.badge { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; }
.badge-10, .badge-9 { background: rgba(34,197,94,0.15); color: #4ade80; }
.badge-8, .badge-7 { background: rgba(79,142,247,0.15); color: #7ab3f8; }
.badge-6, .badge-5 { background: rgba(245,158,11,0.15); color: #fbbf24; }
.badge-4, .badge-3, .badge-2, .badge-1 { background: rgba(239,68,68,0.15); color: #f87171; }
.badge-present { background: rgba(34,197,94,0.15); color: #4ade80; }
.badge-absent { background: rgba(239,68,68,0.15); color: #f87171; }
.badge-late { background: rgba(245,158,11,0.15); color: #fbbf24; }

.grade-table-wrap { overflow-x: auto; }
.grade-input {
  width: 42px; padding: 5px; text-align: center;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 6px; color: var(--text); font-size: 13px;
  font-family: 'JetBrains Mono', monospace;
}
.grade-input:focus { outline: none; border-color: var(--accent); }
.att-btn {
  padding: 4px 12px; border-radius: 20px; font-size: 11px;
  cursor: pointer; font-family: inherit; font-weight: 500; border: none;
  transition: all 0.15s; margin-right: 6px;
}

.date-row { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
.date-chip {
  padding: 6px 14px; border-radius: 8px; font-size: 12px;
  background: var(--surface); border: 1px solid var(--border);
  cursor: pointer; color: var(--text2); transition: all 0.15s;
}
.date-chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }

.select-row { display: flex; gap: 12px; margin-bottom: 20px; align-items: center; flex-wrap: wrap; }
.select-row label { font-size: 13px; color: var(--text2); }
select {
  padding: 8px 14px; background: var(--surface2);
  border: 1px solid var(--border); border-radius: 8px;
  color: var(--text); font-size: 13px; font-family: inherit; outline: none;
}
select:focus { border-color: var(--accent); }

.diary-day { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius2); margin-bottom: 16px; overflow: hidden; }
.diary-day-header { padding: 14px 20px; background: var(--surface2); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.diary-day-header h3 { font-size: 14px; font-weight: 600; }
.diary-day-header span { font-size: 12px; color: var(--text2); }
.lesson-row {
  display: grid;
  grid-template-columns: 32px 1fr 100px 70px 90px;
  gap: 16px; align-items: center;
  padding: 12px 20px; border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.lesson-row:last-child { border-bottom: none; }
.lesson-num { font-size: 11px; color: var(--text3); font-family: 'JetBrains Mono', monospace; text-align: center; }
.lesson-subject { font-weight: 500; }
.lesson-teacher { font-size: 12px; color: var(--text2); }

.notif { display: flex; gap: 14px; align-items: flex-start; padding: 14px 18px; border-radius: var(--radius); background: var(--surface2); border: 1px solid var(--border); margin-bottom: 10px; }
.notif-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }
.notif-text { font-size: 13px; line-height: 1.6; }
.notif-time { font-size: 11px; color: var(--text3); margin-top: 3px; }

.avatar { width: 32px; height: 32px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; flex-shrink: 0; }
.av-blue { background: rgba(79,142,247,0.2); color: var(--accent); }
.av-purple { background: rgba(124,58,237,0.2); color: #a78bfa; }
.td-flex { display: flex; align-items: center; gap: 10px; }

.save-flash {
  position: fixed; bottom: 20px; right: 20px;
  background: var(--green); color: #fff; padding: 10px 18px;
  border-radius: 8px; font-size: 13px; font-weight: 500;
  opacity: 0; transition: opacity 0.3s; pointer-events: none;
}
.save-flash.show { opacity: 1; }
</style>

const JSONBIN_API_KEY = '$2a$10$Gi.k.77zA4oqHpM7hiWOPu.sz164TIhfB/m5M0o91k2DOfHCi08b6';
const BIN_ID_GRADES = '69be81fdaa77b81da90584f9';
const BIN_ID_ATT    = '69be81feaa77b81da90584fe';

async function jsonbinGet(binId) {
  const res = await fetch(`https://api.jsonbin.io/v3/b/${binId}/latest`, {
    headers: { 'X-Master-Key': JSONBIN_API_KEY }
  });
  const data = await res.json();
  return data.record;
}

async function jsonbinSet(binId, record) {
  await fetch(`https://api.jsonbin.io/v3/b/${binId}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json', 'X-Master-Key': JSONBIN_API_KEY },
    body: JSON.stringify(record)
  });
}

async function initData() {
  Object.keys(CLASSES).forEach(cls => {
    GRADES[cls] = {};
    ATTENDANCE[cls] = {};
    CLASSES[cls].forEach(st => { GRADES[cls][st] = {}; });
  });
  try {
    const loaded = await jsonbinGet(BIN_ID_GRADES);
    if (loaded && typeof loaded === 'object' && !Array.isArray(loaded)) {
      Object.keys(loaded).forEach(cls => {
        if (!GRADES[cls]) GRADES[cls] = {};
        Object.keys(loaded[cls]).forEach(st => {
          if (!GRADES[cls][st]) GRADES[cls][st] = {};
          Object.assign(GRADES[cls][st], loaded[cls][st]);
        });
      });
    }
  } catch(e) {}
  try {
    const loaded = await jsonbinGet(BIN_ID_ATT);
    if (loaded && typeof loaded === 'object' && !Array.isArray(loaded)) {
      Object.keys(loaded).forEach(cls => {
        if (!ATTENDANCE[cls]) ATTENDANCE[cls] = {};
        Object.assign(ATTENDANCE[cls], loaded[cls]);
      });
    }
  } catch(e) {}
}

async function persistGrades() {
  try { await jsonbinSet(BIN_ID_GRADES, GRADES); } catch(e) {}
}

async function persistAttendance() {
  try { await jsonbinSet(BIN_ID_ATT, ATTENDANCE); } catch(e) {}
}

function getTodayStr() {
  const d = new Date();
  const year = d.getFullYear();
  const month = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${year}-${month}-${day}`;
}

function formatDate(str) {
  const d = new Date(str);
  return `${d.getDate()} ${MONTHS[d.getMonth()]}`;
}

function doLogin() {
  const u = document.getElementById('username').value.trim();
  const p = document.getElementById('password').value.trim();
  const selectedRole = document.querySelector('.role-tab.active')?.textContent.trim().toLowerCase();
  const roleMap = { 'teacher': 'teacher', 'student': 'student', 'parent': 'parent' };
  const role = roleMap[selectedRole] || 'student';

  let key = u;
  let user = USERS[u];
  if (!user && role === 'teacher') {
    key = u + '_t';
    user = USERS[key];
  }

  if (!user || user.pass !== p || user.role !== role) {
    document.getElementById('login-error').textContent = 'Incorrect username, password, or role';
    return;
  }
  currentUser = { ...user, username: key };
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('app-screen').classList.remove('hidden');
  buildApp();
}

  currentUser = null;

function renderDiaryMonth() {
  const cls = window._diaryClass;

  const [year, month] = val.split('-').map(Number);

  const d = new Date(year, month - 1, 1);
  while (d.getMonth() === month - 1) {
    const dow = d.getDay();
    if (dow >= 1 && dow <= 5) allDays.push(new Date(d));
    d.setDate(d.getDate() + 1);
  }

  // Group into weeks (Mon-Fri)
  const weeks = [];
  let week = [];
  allDays.forEach(day => {
    if (day.getDay() === 1 && week.length > 0) {
      weeks.push(week);
      week = [];
    }
    week.push(day);
  });
  if (week.length > 0) weeks.push(week);

  const dayKeyMap = {1:'Mon',2:'Tue',3:'Wed',4:'Thu',5:'Fri'};

  document.getElementById('diary-content').innerHTML = weeks.map((wk, wi) => {
    const wStart = wk[0];
    const wEnd = wk[wk.length - 1];
    const weekLabel = `${wStart.getDate()}.${String(wStart.getMonth()+1).padStart(2,'0')}.${wStart.getFullYear()} – ${wEnd.getDate()}.${String(wEnd.getMonth()+1).padStart(2,'0')}.${wEnd.getFullYear()}`;

    const daysHtml = wk.map(day => {
      const dateStr = (() => {
        const year = day.getFullYear();
        const month = String(day.getMonth()+1).padStart(2,'0');
        const d2 = String(day.getDate()).padStart(2,'0');
        return `${year}-${month}-${d2}`;
      })();
      const dk = dayKeyMap[day.getDay()];
      const schedule = CLASS_SCHEDULE[cls]?.[dk] || [];
      const att = ATTENDANCE[cls]?.[dateStr] || {};
      const attVal = att[studentName] || null;

      return `
        <div style="margin-bottom:12px;">
          <div style="font-size:12px;font-weight:500;color:var(--text2);padding:8px 0 6px;border-bottom:1px solid var(--border);margin-bottom:8px;">
            ${DAY_NAMES_LONG[day.getDay()-1]}, ${day.getDate()} ${MONTHS[day.getMonth()]}
            ${attVal ? `<span class="badge badge-${attVal}" style="margin-left:10px;">${attVal==='present'?'Present':attVal==='absent'?'Absent':'Late'}</span>` : ''}
          </div>
          <table style="width:100%;border-collapse:collapse;">
            <thead>
              <tr>
                <th style="padding:4px 10px;text-align:left;font-size:10px;color:var(--text3);font-weight:500;width:28px;">#</th>
                <th style="padding:4px 10px;text-align:left;font-size:10px;color:var(--text3);font-weight:500;">Subject</th>
                <th style="padding:4px 10px;text-align:center;font-size:10px;color:var(--text3);font-weight:500;">Grade</th>
              </tr>
            </thead>
            <tbody>
              ${schedule.map((lesson, i) => {
                const g = GRADES[cls]?.[studentName]?.[lesson.sub]?.[dateStr];
                return `<tr style="${i%2===0?'background:var(--surface2)':''}">
                  <td style="padding:6px 10px;font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace;">${i+1}</td>
                  <td style="padding:6px 10px;font-size:13px;font-weight:500;">${lesson.sub}</td>
                  <td style="padding:6px 10px;text-align:center;">${g ? `<span class="badge badge-${g}">${g}</span>` : '<span style="color:var(--text3);font-size:12px;">—</span>'}</td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>`;
    }).join('');

    return `
      <div class="table-card" style="margin-bottom:20px;">
        <div class="table-header">
          <h3>Week ${wi+1} &nbsp;<span style="font-weight:400;color:var(--text2);font-size:13px;">${weekLabel}</span></h3>
        </div>
        <div style="padding:16px 20px;">
          ${daysHtml}
        </div>
      </div>`;
  }).join('');
}

function buildMyGradesPage() {
  return `<div class="page" id="page-my-grades">
    <div class="page-title">⭐ My Grades</div>
    <div class="page-sub">Academic year overview</div>
    <div id="my-grades-content"></div>
  </div>`;
}

function renderMyGrades() {
  const studentName = currentUser.role==='parent' ? currentUser.studentName : currentUser.name;
  const cls = currentUser.role==='parent' ? currentUser.studentClass : currentUser.class;
  const subjectGrades = GRADES[cls]?.[studentName] || {};

  if (!Object.keys(subjectGrades).length) {
    document.getElementById('my-grades-content').innerHTML = `<div style="text-align:center;padding:40px;color:var(--text3);">No grades recorded yet.</div>`;
    return;
  }

  const rows = Object.entries(subjectGrades).map(([subj, dates]) => {
    const vals = Object.values(dates);
    const avg = vals.length ? (vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1) : '—';
    const entries = Object.entries(dates).map(([d,g]) =>
      `<span style="font-size:11px;color:var(--text2);margin-right:8px;">${formatDate(d)}: <span class="badge badge-${g}">${g}</span></span>`
    ).join('');
    return `<tr>
      <td>${subj}</td>
      <td>${entries}</td>
      <td><span class="badge badge-${Math.round(parseFloat(avg))}">${avg}</span></td>
    </tr>`;
  }).join('');

  document.getElementById('my-grades-content').innerHTML = `
    <div class="table-card">
      <table>
        <thead><tr><th>Subject</th><th>Grades</th><th>Average</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `;
}

function flashSave() {
  const f = document.getElementById('save-flash');
  f.classList.add('show');
  setTimeout(() => f.classList.remove('show'), 2000);
}

(async () => { await initData(); })();
</script>
</body>
</html>
